<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="navbar">
    <h1>My Cart</h1>
    <div class="cart-icon" onclick="goToCart()">
      🛒 Cart Items (<span id="cartCount">0</span>)
    </div>
  </div>

  <div class="container">
    <div id="cartItems"></div>
    <div class="cart-summary">
      <h2>Total: $<span id="cartTotal">0</span></h2>
      <button onclick="proceedToAddress()" class="checkout-btn">Proceed to Address</button>
      <button onclick="window.location.href='index.html'" class="continue-btn">Continue Shopping</button>
    </div>
  </div>

  <script src="cart.js"></script>
  <script>
    displayCart();
  </script>
</body>
</html>
